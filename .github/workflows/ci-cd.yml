name: Frontend CI/CD

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy_dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: validate
    runs-on: ubuntu-latest
    environment: dev
    env:
      MSC_API_BASE_URL: ${{ vars.VITE_API_BASE_URL_DEV }}
      VITE_COGNITO_ENABLED: "false"
      VITE_COGNITO_DOMAIN: ""
      VITE_COGNITO_CLIENT_ID: ""
      VITE_COGNITO_REDIRECT_URI: ""
      VITE_COGNITO_LOGOUT_URI: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Dev API base URL
        run: |
          if [ -z "${MSC_API_BASE_URL}" ]; then
            echo "VITE_API_BASE_URL_DEV is missing in GitHub Environment 'dev'."
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.MSC_API_BASE_URL }}
          VITE_COGNITO_ENABLED: ${{ env.VITE_COGNITO_ENABLED }}
          VITE_COGNITO_DOMAIN: ${{ env.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ env.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: ${{ env.VITE_COGNITO_REDIRECT_URI }}
          VITE_COGNITO_LOGOUT_URI: ${{ env.VITE_COGNITO_LOGOUT_URI }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel config (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel output
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ env.MSC_API_BASE_URL }}
          VITE_COGNITO_ENABLED: ${{ env.VITE_COGNITO_ENABLED }}
          VITE_COGNITO_DOMAIN: ${{ env.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ env.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: ${{ env.VITE_COGNITO_REDIRECT_URI }}
          VITE_COGNITO_LOGOUT_URI: ${{ env.VITE_COGNITO_LOGOUT_URI }}

      - name: Deploy to Vercel Dev
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy_prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: prod
    env:
      MSC_API_BASE_URL: ${{ vars.VITE_API_BASE_URL_PROD }}
      VITE_COGNITO_ENABLED: "false"
      VITE_COGNITO_DOMAIN: ""
      VITE_COGNITO_CLIENT_ID: ""
      VITE_COGNITO_REDIRECT_URI: ""
      VITE_COGNITO_LOGOUT_URI: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Prod API base URL
        run: |
          if [ -z "${MSC_API_BASE_URL}" ]; then
            echo "VITE_API_BASE_URL_PROD is missing in GitHub Environment 'prod'."
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.MSC_API_BASE_URL }}
          VITE_COGNITO_ENABLED: ${{ env.VITE_COGNITO_ENABLED }}
          VITE_COGNITO_DOMAIN: ${{ env.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ env.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: ${{ env.VITE_COGNITO_REDIRECT_URI }}
          VITE_COGNITO_LOGOUT_URI: ${{ env.VITE_COGNITO_LOGOUT_URI }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel config (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel output
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ env.MSC_API_BASE_URL }}
          VITE_COGNITO_ENABLED: ${{ env.VITE_COGNITO_ENABLED }}
          VITE_COGNITO_DOMAIN: ${{ env.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ env.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: ${{ env.VITE_COGNITO_REDIRECT_URI }}
          VITE_COGNITO_LOGOUT_URI: ${{ env.VITE_COGNITO_LOGOUT_URI }}

      - name: Deploy to Vercel Prod
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
